name: ReaPack Index
on:
  push:
    branches:
      - master
      - main
      
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install reapack-index
        run: gem install reapack-index

      - name: Generate index.xml
        # ここにオプションを追加しました（対話プロンプトの回避と名前設定）
        run: reapack-index --name "HL_ReaScripts" --about README.md --no-commit

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update index.xml"
          file_pattern: index.xml